[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "insurance-fairness"
version = "0.1.0"
description = "Proxy discrimination auditing for UK insurance pricing models. Implements FCA Consumer Duty and Equality Act 2010 compliance checks."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Burning Cost", email = "pricing.frontier@gmail.com" }]
keywords = [
    "insurance",
    "fairness",
    "proxy discrimination",
    "FCA",
    "actuarial",
    "pricing",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Financial and Insurance Industry",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "License :: OSI Approved :: MIT License",
]
dependencies = [
    "polars>=1.0.0",
    "catboost>=1.2.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "scipy>=1.11.0",
    "jinja2>=3.1.0",
    "pyarrow>=12.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
]

[project.urls]
Homepage = "https://github.com/burningcost/insurance-fairness"
Repository = "https://github.com/burningcost/insurance-fairness"
Issues = "https://github.com/burningcost/insurance-fairness/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/insurance_fairness"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

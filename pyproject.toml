[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "insurance-fairness"
version = "0.4.0"
description = "Proxy discrimination auditing, discrimination-free pricing, and diagnostics for UK insurance pricing models. Implements FCA Consumer Duty and Equality Act 2010 compliance checks."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Burning Cost", email = "pricing.frontier@gmail.com" }]
keywords = [
    "insurance",
    "fairness",
    "proxy discrimination",
    "FCA",
    "actuarial",
    "pricing",
    "pareto",
    "nsga2",
    "multi-objective",
    "optimal-transport",
    "discrimination-free",
    "causal",
    "shapley",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Financial and Insurance Industry",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "License :: OSI Approved :: MIT License",
    "Intended Audience :: Science/Research",
    "Topic :: Office/Business :: Financial",
]
dependencies = [
    "polars>=1.0.0",
    "catboost>=1.2.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "scipy>=1.11.0",
    "jinja2>=3.1.0",
    "pyarrow>=12.0.0",
    # Added for optimal_transport subpackage
    "statsmodels>=0.14.5",
    "networkx>=3.0",
    "POT>=0.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pdoc>=14.0.0",
]
pareto = [
    "pymoo>=0.6.1",
]
plot = [
    "matplotlib>=3.7.0",
]
all = [
    "pymoo>=0.6.1",
    "matplotlib>=3.7.0",
]

[project.urls]
Homepage = "https://github.com/burning-cost/insurance-fairness"
Repository = "https://github.com/burning-cost/insurance-fairness"
Issues = "https://github.com/burning-cost/insurance-fairness/issues"
Documentation = "https://burning-cost.github.io/insurance-fairness"

[tool.hatch.build.targets.wheel]
packages = ["src/insurance_fairness"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
